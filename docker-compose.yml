services:
  postgres:
    image: postgres:15-alpine
    container_name: civs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-civs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civs_password}
      POSTGRES_DB: ${POSTGRES_DB:-civs_db}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: civs_app
    restart: unless-stopped
    ports:
      - "${CIVS_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-civs_user}:${POSTGRES_PASSWORD:-civs_password}@postgres:5432/${POSTGRES_DB:-civs_db}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in environment or .env before starting CIVS}
      AUTO_INIT_DB: "false"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
