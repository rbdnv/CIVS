version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: civs_postgres
    environment:
      POSTGRES_USER: civs_user
      POSTGRES_PASSWORD: civs_password
      POSTGRES_DB: civs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civs_user -d civs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: civs_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://civs_user:civs_password@postgres:5432/civs_db
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  postgres_data: